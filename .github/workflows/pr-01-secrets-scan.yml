name: pr-01 secrets-scan

# Agent 1: catch hardcoded secrets, leaked URLs, and obfuscation-property
# violations. Three layers: gitleaks (static), a custom regex check for
# guapo's stable identifiers, and (TODO) an LLM catch-net via the agent
# inference proxy on slim for the things static rules can't see.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  secrets-scan:
    name: secrets-scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install scanners
        run: |
          pip install --quiet semgrep==1.100.0
          curl -fsSL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Run gitleaks
        id: gitleaks
        run: |
          gitleaks detect --no-banner --redact --exit-code 1 --report-format=sarif --report-path=gitleaks.sarif \
            || (echo "::error::gitleaks found secrets in the tree" && exit 1)

      - name: Run semgrep secrets ruleset
        run: |
          semgrep --config=p/secrets --error --quiet --exclude=tests --exclude=.gitnexus . \
            || (echo "::error::semgrep found secret-shaped patterns" && exit 1)

      - name: Check for guapo identifier leaks outside allowed paths
        run: |
          set -euo pipefail
          # Stable guapo identifiers from INTERFACE.md. These may only appear
          # in core/chat/security.py (output filter), core/agents/prompts/
          # (judge templates), and docker/ (deployment config).
          forbidden='100\.91\.130\.128|192\.168\.1\.103|guapo\.local|/models/phi-4-mini'
          hits=$(grep -RnE "$forbidden" \
              --include='*.py' --include='*.html' --include='*.md' \
              --include='*.yaml' --include='*.yml' \
              --exclude-dir=.git --exclude-dir=.gitnexus --exclude-dir=node_modules \
              --exclude-dir=__pycache__ --exclude-dir=tests \
              . 2>/dev/null \
              | grep -v 'core/chat/security.py' \
              | grep -v 'core/chat/client.py' \
              | grep -v 'core/chat/README.md' \
              | grep -v 'core/agents/prompts/' \
              | grep -v 'core/agents/proxy.py' \
              | grep -v 'core/observability/templates/_stats_guapo.html' \
              | grep -v 'docker/' \
              | grep -v 'docs/' \
              | grep -v '.devcontainer/mock-guapo.py' \
              | grep -v '.github/workflows/' \
              | grep -v 'CHANGELOG' || true)
          if [[ -n "$hits" ]]; then
              echo "::error::guapo identifiers found outside the allowed locked paths:"
              echo "$hits"
              exit 1
          fi
          echo "✓ no guapo identifiers leaked into student-facing code"

      - name: LLM obfuscation review
        if: success()
        env:
          AGENT_PROXY_TOKEN: ${{ secrets.AGENT_PROXY_TOKEN }}
          AGENT_PROXY_URL: ${{ secrets.AGENT_PROXY_URL }}
        run: |
          # The LLM catch-net runs via the agent inference proxy on slim.
          # If the proxy isn't configured (no AGENT_PROXY_TOKEN), this step
          # logs a notice and exits 0 — the static layer above is the gate.
          if [[ -z "${AGENT_PROXY_TOKEN:-}" ]]; then
            echo "::notice::AGENT_PROXY_TOKEN not set, skipping LLM review (static layer covers)"
            exit 0
          fi
          echo "TODO: invoke core/agents/runners/secrets_scan_llm.py once it's wired up"
          echo "      (sends the diff through phi-4-mini via the slim proxy with"
          echo "       the secrets_review_prompt template, fail-closed parsing)"

      - name: Comment on PR
        if: failure()
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## ✗ secrets-scan failed

            One of the static checks (gitleaks / semgrep / guapo identifier
            grep) flagged your changes. See the workflow logs for the exact
            file and line.

            **What this agent checks:** hardcoded secrets, leaked URLs,
            anything that would expose guapo's identifiers (URL, IP, model
            names) to students.

            Run `./scripts/explain-failure.sh secrets-scan` for the full
            explanation, or read [Agents Reference → secrets-scan](../wiki/05-Agents-Reference#secrets-scan).
